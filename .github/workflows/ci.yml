# CI (plan.md §30). Build/e2e/deploy jobs are added in their phases.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # I8 escape hatch is greppable (plan.md §9.1): skipTenantScope may only
      # appear in the plugin itself, engines/, migrations/, jobs/, services/admin/.
      - name: skipTenantScope gate
        run: |
          VIOLATIONS=$(grep -rn "skipTenantScope" apps/api/src \
            | grep -v "apps/api/src/plugins/tenantScope.ts" \
            | grep -v "apps/api/src/jobs/" \
            | grep -v "apps/api/src/engines/" \
            | grep -v "apps/api/src/services/admin/" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "skipTenantScope outside allowed paths:"; echo "$VIOLATIONS"; exit 1
          fi
      # I3: GeneralLedger is the SOLE writer to journalentries. The model may
      # only be imported by the engine, the read-only service/jobs, and tests.
      - name: journalentries sole-writer gate
        run: |
          VIOLATIONS=$(grep -rln "models/JournalEntry" apps/api/src \
            | grep -v "apps/api/src/engines/ledger/" \
            | grep -v "apps/api/src/models/JournalEntry.ts" \
            | grep -v "apps/api/src/jobs/ledgerIntegrity.ts" \
            | grep -v "apps/api/src/services/journalService.ts" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "JournalEntry imported outside allowed modules:"; echo "$VIOLATIONS"; exit 1
          fi

  test:
    runs-on: ubuntu-latest
    # §30: mongodb-memory-server replSet + a real redis service (queues, limiters)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: true
