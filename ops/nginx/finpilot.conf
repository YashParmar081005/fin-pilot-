# Edge config (plan.md §28.5, verbatim shape). TLS 1.3 only, HSTS preload,
# CSP without unsafe-inline, SSE unbuffered, /metrics never exposed.
limit_req_zone  $binary_remote_addr zone=api:20m  rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream api_upstream { server 127.0.0.1:4000; }

server {
  http2 on;
  ssl_protocols TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' https://api.razorpay.com; frame-ancestors 'none'; base-uri 'none'" always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  server_tokens off;
  client_max_body_size 10m;

  # observability endpoints are scrape-only — never routable from outside
  location = /metrics { deny all; }
  location = /readyz  { deny all; }

  location /api/ {
    limit_req  zone=api burst=60 nodelay;
    limit_conn conn 20;
    proxy_pass http://api_upstream;
    proxy_read_timeout 65s;                 # > the app's 60s, so the app times out first
  }
  location /api/v1/ai/ {
    proxy_pass http://api_upstream;
    proxy_buffering off;                    # SSE must not be buffered
    proxy_read_timeout 300s;
  }
}
